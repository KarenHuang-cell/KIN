<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Staggered Grid Demo</title>
<style>
    body { margin: 0; background: #ECECE8; font-family: 'Plus Jakarta Sans', sans-serif; }
    h2 { text-align: center; padding: 48px 0 24px; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #999; }
    .grid {
        max-width: 900px;
        margin: 0 auto 60px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
        padding: 0 40px;
    }
    .card { text-align: center; }
    .card__photo {
        width: 100%;
        aspect-ratio: 3 / 4;
        background: #c8cdd8;
        margin-bottom: 12px;
    }
    .card__name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #031d45; }
    .card__title { font-size: 12px; color: #777; margin-top: 4px; }

    /* FLAT — all aligned */
    .grid--flat .card { margin-top: 0; }

    /* STAGGERED — middle column offset */
    .grid--stagger .card:nth-child(3n+2) { margin-top: 48px; }

    /* Row 2 centering */
    .grid--stagger .card:nth-child(4) { grid-column: 1 / 2; margin-left: auto; margin-right: auto; width: 100%; margin-left: 50%; }
    .grid--stagger .card:nth-child(5) { grid-column: 2 / 3; }

    .grid--flat .card:nth-child(4),
    .grid--flat .card:nth-child(5) {
        /* center the last 2 */
    }

    .row2 {
        max-width: 900px;
        margin: 0 auto 80px;
        display: flex;
        justify-content: center;
        gap: 32px;
        padding: 0 40px;
    }
    .row2 .card { width: calc(33.33% - 22px); }
    .row2--stagger .card:nth-child(2) { margin-top: 48px; }

    .label { font-size: 11px; text-align: center; color: #999; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>

<h2>Flat (normal)</h2>
<div class="grid grid--flat">
    <div class="card"><div class="card__photo"></div><div class="card__name">Person A</div><div class="card__title">Title</div></div>
    <div class="card"><div class="card__photo"></div><div class="card__name">Person B</div><div class="card__title">Title</div></div>
    <div class="card"><div class="card__photo"></div><div class="card__name">Person C</div><div class="card__title">Title</div></div>
</div>
<div class="row2">
    <div class="card"><div class="card__photo"></div><div class="card__name">Person D</div><div class="card__title">Title</div></div>
    <div class="card"><div class="card__photo"></div><div class="card__name">Person E</div><div class="card__title">Title</div></div>
</div>

<h2>Staggered (middle column offset down)</h2>
<div class="grid grid--stagger" style="margin-bottom: 0;">
    <div class="card"><div class="card__photo"></div><div class="card__name">Person A</div><div class="card__title">Title</div></div>
    <div class="card"><div class="card__photo"></div><div class="card__name">Person B</div><div class="card__title">Title</div></div>
    <div class="card"><div class="card__photo"></div><div class="card__name">Person C</div><div class="card__title">Title</div></div>
</div>
<div class="row2 row2--stagger">
    <div class="card"><div class="card__photo"></div><div class="card__name">Person D</div><div class="card__title">Title</div></div>
    <div class="card"><div class="card__photo"></div><div class="card__name">Person E</div><div class="card__title">Title</div></div>
</div>

</body>
</html>
