<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Icon Redesign — KIN Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 100px 60px 120px;
        }

        h1 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 64px;
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-left: 1px solid rgba(255,255,255,0.08);
        }

        .cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            padding: 52px 28px;
            border-right: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: default;
            transition: background 0.2s ease;
        }

        .cell:hover { background: rgba(255,255,255,0.025); }

        .cell:hover svg .accent { opacity: 1 !important; }

        .label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            line-height: 1.65;
            text-align: center;
            transition: color 0.2s ease;
        }

        .cell:hover .label { color: rgba(255,255,255,0.75); }
    </style>
</head>
<body>
<div class="page">

    <h1>KIN — Services Icons</h1>

    <div class="grid">

        <!-- 1. Event Planning & Management -->
        <!-- Calendar: shell + teal header + two pins -->
        <div class="cell">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="5" y="10" width="38" height="34" rx="2.5" stroke="white" stroke-width="1.75"/>
                <rect x="5.875" y="10.875" width="36.25" height="9" rx="1.5" class="accent" fill="#00C1E6" opacity="0.85"/>
                <line x1="15" y1="6" x2="15" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="33" y1="6" x2="33" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="label">Event Planning<br/>&amp; Management</span>
        </div>

        <!-- 2. Design, Production & Build -->
        <!-- Set square: triangle + teal right-angle mark -->
        <div class="cell">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path d="M6 43 L6 7 L43 43 Z" stroke="white" stroke-width="1.75" stroke-linejoin="round"/>
                <path d="M6 35 L14 35 L14 43" class="accent" stroke="#00C1E6" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
            </svg>
            <span class="label">Design, Production<br/>&amp; Build</span>
        </div>

        <!-- 3. Logistics, Operation & Furnishing -->
        <!-- Truck: cargo box + cab + two wheels -->
        <div class="cell">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="2" y="14" width="27" height="19" rx="1.75" stroke="white" stroke-width="1.75"/>
                <path d="M29 19 L29 33 L46 33 L46 25 L40 19 Z" stroke="white" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <path d="M31 20 L31 25 L44 25 L40.5 20 Z" class="accent" fill="#00C1E6" opacity="0.8"/>
                <circle cx="11" cy="33" r="4.5" stroke="white" stroke-width="1.75"/>
                <circle cx="37" cy="33" r="4.5" stroke="white" stroke-width="1.75"/>
            </svg>
            <span class="label">Logistics, Operation<br/>&amp; Furnishing</span>
        </div>

        <!-- 4. Audio-Visual System & Show Presentation -->
        <!-- Speaker + two sound arcs -->
        <div class="cell">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <!-- Speaker body -->
                <rect x="5" y="16" width="12" height="16" rx="1.5" stroke="white" stroke-width="1.75"/>
                <!-- Speaker horn -->
                <path d="M17 16 L28 8 L28 40 L17 32 Z" stroke="white" stroke-width="1.75" stroke-linejoin="round" fill="none"/>
                <!-- Inner arc -->
                <path d="M32 17 C36 20 36 28 32 31" stroke="white" stroke-width="1.75" stroke-linecap="round" fill="none"/>
                <!-- Outer arc (teal) -->
                <path d="M36 12 C43 17 43 31 36 36" class="accent" stroke="#00C1E6" stroke-width="1.75" stroke-linecap="round" fill="none" opacity="0.9"/>
            </svg>
            <span class="label">Audio-Visual System<br/>&amp; Show Presentation</span>
        </div>

        <!-- 5. Venue Overlay Planning -->
        <!-- Floor plan: boundary + cross divider + teal pin -->
        <div class="cell">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="4" y="4" width="40" height="40" rx="1.75" stroke="white" stroke-width="1.75"/>
                <line x1="4" y1="24" x2="44" y2="24" stroke="white" stroke-width="1" opacity="0.45"/>
                <line x1="24" y1="4" x2="24" y2="44" stroke="white" stroke-width="1" opacity="0.45"/>
                <circle cx="34" cy="14" r="5" class="accent" stroke="#00C1E6" stroke-width="1.75" opacity="0.9"/>
                <circle cx="34" cy="14" r="2" class="accent" fill="#00C1E6" opacity="0.9"/>
                <line x1="34" y1="19" x2="34" y2="23" class="accent" stroke="#00C1E6" stroke-width="1.75" stroke-linecap="round" opacity="0.9"/>
            </svg>
            <span class="label">Venue Overlay<br/>Planning</span>
        </div>

    </div>
</div>
</body>
</html>
